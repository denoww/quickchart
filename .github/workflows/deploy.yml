name: Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      label:
        description: Deploy
        required: false
        default: Deploy

jobs:
  prepare:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Upload docker-compose.yml para S3
        run: aws s3 cp docker-compose.yml s3://sc-environments/quickchart/docker-compose.yml --acl private

  deploy:
    needs: prepare
    uses: denoww/github_actions/.github/workflows/rodar_docker_compose_no_ec2.yml@main
    with:
      ec2_com_tag: quickchart
      workdir: /opt/quickchart
      s3_compose_uri: s3://sc-environments/quickchart/docker-compose.yml
    secrets:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
